name: Build and deploy Jekyll site to Pages
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: .
          destination: ./_site
      - name: Detect symlinks and hard links
        run: |
          echo "Checking for symlinks in _site..."
          if find ./_site -type l | grep .; then
            echo "ERROR: Symlinks found in _site."
            find ./_site -type l
            exit 1
          else
            echo "No symlinks found."
          fi
          echo "Checking for hard links in _site..."
          if find ./_site -type f -links +1 | grep .; then
            echo "ERROR: Hard links found in _site."
            find ./_site -type f -links +1
            exit 1
          else
            echo "No hard links found."
          fi
      - name: Create sanitized directory with only real files
        run: |
          rm -rf _site_sanitized
          mkdir _site_sanitized
          cd _site
          find . -type f -exec bash -c 'install -D -- "$1" "../_site_sanitized/${1#./}"' _ {} \;
          cd ..
      - uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ./_site_sanitized

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
